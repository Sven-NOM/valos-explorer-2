<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ValOS Explorer — Validator Operations Standard</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Host+Grotesk:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f4; --surface:#ffffff; --surface2:#fafafa;
  --ink:#000000; --ink2:#555555; --ink3:#999999;
  --line:#000000; --line2:#e0e0e0;
  --accent:#fc5f2b; --accent-ink:#e04e1e; --accent-soft:rgba(252,95,43,0.09);
  --pass:#059669; --partial:#d97706; --fail:#dc2626; --na:#999999;
  --c-FIN:#d97706; --c-SLS:#dc2626; --c-DOW:#7c3aed; --c-KEC:#0891b2;
  --c-HCK:#ea580c; --c-GIR:#059669; --c-SPS:#db2777; --c-RER:#4f46e5;
  --t-FIN:rgba(217,119,6,0.10); --t-SLS:rgba(220,38,38,0.10); --t-DOW:rgba(124,58,237,0.10); --t-KEC:rgba(8,145,178,0.10);
  --t-HCK:rgba(234,88,12,0.10); --t-GIR:rgba(5,150,105,0.10); --t-SPS:rgba(219,39,119,0.10); --t-RER:rgba(79,70,229,0.10);
  --mono:'DM Mono','Courier New',monospace;
  --disp:'Host Grotesk',Arial,'Helvetica Neue',Helvetica,sans-serif;
  --body:'Host Grotesk',Arial,'Helvetica Neue',Helvetica,sans-serif;
  --rad:0px; --rad-s:0px;
  --shadow:none;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation:none!important;transition:none!important}
}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--accent-ink);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--body)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
code,.mono{font-family:var(--mono)}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:40;background:#ffffff;border-bottom:1px solid var(--line)}
.topbar-in{max-width:1240px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:18px;height:58px}
.brand{display:flex;align-items:baseline;gap:9px;font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:.01em;color:var(--ink);white-space:nowrap}
.brand .tag{font-family:var(--mono);font-size:10.5px;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase}
nav.tabs{display:flex;gap:2px;margin-left:auto;overflow-x:auto;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
nav.tabs a{padding:7px 13px;border-radius:8px;color:var(--ink2);font-weight:500;font-size:14px;white-space:nowrap}
nav.tabs a:hover{background:var(--surface2);text-decoration:none}
nav.tabs a.on{background:var(--ink);color:#fff}
.wrap{max-width:1240px;margin:0 auto;padding:26px 20px 90px}

/* ---------- generic ---------- */
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);font-weight:500}
h1.disp{font-family:var(--disp);font-size:clamp(28px,4.5vw,44px);line-height:1.08;margin:10px 0 14px;font-weight:700;letter-spacing:-.015em}
h2.sec{font-family:var(--disp);font-size:22px;margin:0 0 6px;font-weight:600;letter-spacing:-.01em}
.lede{font-size:16.5px;color:var(--ink2);max-width:62ch}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow)}
.pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;border:1px solid var(--line);background:var(--surface2);color:var(--ink2);white-space:nowrap}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11.5px;font-weight:600;padding:2.5px 8px;border-radius:6px;text-decoration:none;border:1px solid transparent;cursor:pointer}
.chip:hover{text-decoration:none;filter:brightness(.96)}
.chip .dot{width:7px;height:7px;border-radius:2px;flex:none}
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-weight:600;font-size:13.5px;padding:8px 14px;border-radius:8px;cursor:pointer}
.btn:hover{background:var(--surface2);text-decoration:none}
.btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.primary:hover{background:#222}
.btn.small{padding:5px 10px;font-size:12.5px}
.muted{color:var(--ink3)}
.small{font-size:13px}
.backlink{display:inline-flex;gap:6px;align-items:center;font-weight:600;font-size:13.5px;margin-bottom:14px}
.grid{display:grid;gap:14px}
.kbd-hint{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.ticks{display:inline-flex;gap:2px;align-items:center}
.ticks i{width:4px;height:11px;border-radius:1.5px;background:var(--line);display:block}
.ticks i.m{background:var(--accent)}
.ticks i.c{background:var(--c-SPS)}

/* ---------- overview ---------- */
.hero{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);gap:36px;align-items:start;margin-top:14px}
.statline{display:flex;flex-wrap:wrap;gap:10px 26px;margin:22px 0 6px}
.statline .st{display:flex;flex-direction:column}
.statline .n{font-family:var(--disp);font-weight:700;font-size:27px;line-height:1.1}
.statline .l{font-size:12px;color:var(--ink3);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
.fabric-card{padding:18px 18px 14px}
.fabric-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:12px}
.fabric{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:5px}
.fcell{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:6px 4px 5px;border-radius:5px;border:1px solid var(--line2);text-align:center;cursor:pointer;color:var(--ink2);background:var(--surface2);position:relative;transition:transform .08s ease}
.fcell:hover{transform:translateY(-1px);text-decoration:none}
.fcell::before{content:"";display:block;height:3px;border-radius:2px;margin:0 4px 4px;background:var(--cc)}
.fcell.dim{opacity:.22}
.flegend{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px}
.flegend button{border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:3px 10px;font-size:11.5px;font-family:var(--mono);font-weight:500;cursor:pointer;display:inline-flex;gap:6px;align-items:center;color:var(--ink2)}
.flegend button .dot{width:8px;height:8px;border-radius:2.5px}
.flegend button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.fabric-tip{min-height:38px;margin-top:11px;font-size:12.5px;color:var(--ink2);border-top:1px dashed var(--line);padding-top:9px}
.pipeline{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:44px;border:1px solid var(--line);border-radius:var(--rad);overflow:hidden;background:var(--surface)}
.pipe{padding:20px 20px 18px;position:relative;border-left:1px solid var(--line2)}
.pipe:first-child{border-left:none}
.pipe .n{font-family:var(--disp);font-weight:700;font-size:30px}
.pipe h3{margin:2px 0 6px;font-family:var(--disp);font-size:16.5px;font-weight:600}
.pipe p{margin:0;font-size:13.5px;color:var(--ink2)}
.pipe .go{margin-top:12px;display:inline-block;font-weight:600;font-size:13px}
.pipe::after{content:"→";position:absolute;right:-9px;top:24px;font-size:17px;color:var(--ink3);background:var(--surface);z-index:2;padding:0 2px}
.pipe:last-child::after{display:none}
.personas{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-top:16px}
.persona{padding:18px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:transform .1s ease}
.persona:hover{transform:translateY(-2px);text-decoration:none}
.persona .ic{font-size:19px}
.persona h3{margin:0;font-family:var(--disp);font-size:16px;font-weight:600;color:var(--ink)}
.persona p{margin:0;font-size:13.5px;color:var(--ink2);flex:1}
.persona .go{font-weight:600;font-size:13px;color:var(--accent-ink)}
.value{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:16px}
.value .v{padding:16px 18px}
.value h3{margin:0 0 5px;font-size:14.5px;font-family:var(--disp);font-weight:600}
.value p{margin:0;font-size:13.5px;color:var(--ink2)}
.ovh{margin-top:46px}
.crosswalk{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* ---------- risks ---------- */
.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:13px;margin:18px 0 26px}
.catcard{padding:15px 16px 13px;border-top:3px solid var(--cc);cursor:pointer;transition:transform .1s ease;display:flex;flex-direction:column;gap:7px}
.catcard:hover{transform:translateY(-2px);text-decoration:none}
.catcard h3{margin:0;font-family:var(--disp);font-size:15.5px;font-weight:600;color:var(--ink)}
.catcard .meta{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;color:var(--ink3)}
.catcard p{margin:0;font-size:12.8px;color:var(--ink2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.toolrow{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:14px}
.toolrow input[type=search]{flex:1;min-width:200px;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:14px;font-family:var(--body);background:var(--surface)}
.toolrow select{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;background:var(--surface);font-family:var(--body)}
.risklist{display:flex;flex-direction:column;gap:9px}
.riskrow{display:grid;grid-template-columns:74px 1fr auto;gap:14px;padding:13px 16px;align-items:center;cursor:pointer;transition:transform .08s}
.riskrow:hover{transform:translateX(2px);text-decoration:none}
.riskrow .code{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--cc)}
.riskrow .code::before{content:"";display:block;width:26px;height:3px;border-radius:2px;background:var(--cc);margin-bottom:4px}
.riskrow .vec{font-weight:600;font-size:14px;color:var(--ink);margin-bottom:2px}
.riskrow .d{font-size:12.8px;color:var(--ink2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.riskrow .cov{display:flex;flex-direction:column;align-items:flex-end;gap:4px;font-family:var(--mono);font-size:10.5px;color:var(--ink3);white-space:nowrap}
.detail-head{padding:22px 24px;border-top:4px solid var(--cc)}
.detail-head .codeline{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.detail-head h1{font-family:var(--disp);font-size:clamp(20px,3vw,28px);margin:0 0 8px;line-height:1.15;font-weight:700;letter-spacing:-.01em}
.detail-head .desc{font-size:15.5px;color:var(--ink2);max-width:74ch;margin:0}
.twocol{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:16px;margin-top:16px;align-items:start}
.panel{padding:18px 20px}
.panel h2{margin:0 0 4px;font-family:var(--disp);font-size:16px;font-weight:600}
.panel .sub{font-size:12.5px;color:var(--ink3);margin:0 0 13px}
.deflist{display:flex;flex-direction:column;gap:8px}
.defitem{border:1px solid var(--line2);border-radius:8px;padding:11px 13px;background:var(--surface2);cursor:pointer;transition:border-color .1s}
.defitem:hover{border-color:var(--accent);text-decoration:none}
.defitem .t{font-weight:600;font-size:13.5px;color:var(--ink);display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.defitem .g{font-family:var(--mono);font-size:10.5px;color:var(--ink3);letter-spacing:.04em}
.defitem .x{font-size:12.5px;color:var(--ink2);margin-top:3px}
.notebox{border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:var(--ink2);margin-top:14px}

/* ---------- mitigations ---------- */
.mitgroup{margin-bottom:14px;overflow:hidden}
.mitgroup>summary{list-style:none;cursor:pointer;padding:15px 18px;display:flex;gap:12px;align-items:center}
.mitgroup>summary::-webkit-details-marker{display:none}
.mitgroup>summary .car{transition:transform .15s;color:var(--ink3);font-size:12px}
.mitgroup[open]>summary .car{transform:rotate(90deg)}
.mitgroup>summary h3{margin:0;font-family:var(--disp);font-size:16px;font-weight:600;flex:1}
.mitgroup .mits{border-top:1px solid var(--line2);padding:8px}
.mitrow{display:grid;grid-template-columns:1fr auto;gap:12px;padding:11px 12px;border-radius:8px;cursor:pointer;align-items:center}
.mitrow:hover{background:var(--surface2);text-decoration:none}
.mitrow .t{font-weight:600;font-size:14px;color:var(--ink)}
.mitrow .x{font-size:12.5px;color:var(--ink2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.prose p{margin:0 0 11px;color:var(--ink2);font-size:14.5px;max-width:74ch}
.prose h4{font-family:var(--disp);font-size:13.5px;margin:16px 0 7px;font-weight:600;color:var(--ink)}
.prose ul{margin:0 0 11px;padding-left:20px;color:var(--ink2);font-size:14px}
.prose li{margin-bottom:4px}
.chiprow{display:flex;flex-wrap:wrap;gap:6px}
.toollist{display:flex;flex-wrap:wrap;gap:7px}
.toollist a{font-family:var(--mono);font-size:12px;border:1px solid var(--line);border-radius:6px;padding:4px 9px;background:var(--surface2)}

/* ---------- controls / audit ---------- */
.auditbar{padding:16px 18px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:16px;position:sticky;top:64px;z-index:20}
.progress{flex:1;min-width:220px}
.progress .lbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--ink3);margin-bottom:5px}
.pbar{height:9px;border-radius:5px;background:var(--line2);overflow:hidden;display:flex}
.pbar i{display:block;height:100%}
.pbar .p{background:var(--pass)}.pbar .q{background:var(--partial)}.pbar .f{background:var(--fail)}.pbar .x{background:#C2CAD6}
.ctlgroup{margin-bottom:16px}
.ctlgroup .gh{padding:13px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line2)}
.ctlgroup .gh h3{margin:0;font-family:var(--disp);font-size:15.5px;font-weight:600;flex:1}
.ctl{border-bottom:1px solid var(--line2);padding:15px 18px}
.ctl:last-child{border-bottom:none}
.ctl .head{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:7px}
.ctl .head h4{margin:0;font-size:14.5px;font-weight:600;cursor:pointer}
.ctl .head h4:hover{color:var(--accent-ink)}
.req{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:start;padding:9px 11px;border:1px solid var(--line2);border-radius:8px;background:var(--surface2);margin-bottom:7px}
.req .txt{font-size:13.5px;color:var(--ink)}
.req .rid{font-family:var(--mono);font-size:10.5px;color:var(--ink3);margin-top:3px}
.lvl{font-family:var(--mono);font-size:10px;font-weight:600;padding:1.5px 6px;border-radius:4px;letter-spacing:.05em}
.lvl.MUST,.lvl.MUSTNOT{background:#F4E3E3;color:var(--fail)}
.lvl.SHOULD{background:#F4ECDD;color:var(--partial)}
.lvl.MAY{background:#E2EDE6;color:var(--pass)}
.statussel{border:1.5px solid var(--line);border-radius:7px;padding:5px 8px;font-size:12.5px;font-family:var(--body);background:var(--surface);font-weight:500}
.statussel.s-pass{border-color:var(--pass);color:var(--pass)}
.statussel.s-partial{border-color:var(--partial);color:var(--partial)}
.statussel.s-fail{border-color:var(--fail);color:var(--fail)}
.statussel.s-na{border-color:var(--na);color:var(--na)}
.evd{width:100%;border:1px dashed var(--line);border-radius:7px;padding:6px 9px;font-size:12.5px;font-family:var(--body);margin-top:6px;background:#fff;color:var(--ink2);resize:vertical;min-height:30px}
.ctl .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.fwchip{font-family:var(--mono);font-size:10.5px;font-weight:600;border-radius:5px;padding:2px 7px;border:1px solid var(--line);background:#fff;color:var(--ink2)}
.fwchip.SOC2{border-color:#9FB4E8;color:#2C46C7;background:#F0F3FD}
.fwchip.ISO27001{border-color:#A8CDB8;color:#1F7A45;background:#EDF7F1}
.fwchip.OWASP{border-color:#E0BBA4;color:#A05A1F;background:#FBF2EA}

/* ---------- planner ---------- */
.plannerintro{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:16px;margin-bottom:18px;align-items:start}
.kanban-sum{display:flex;gap:8px;flex-wrap:wrap}
.ksum{flex:1 1 0;min-width:82px;padding:10px 11px;border-radius:8px;border:1px solid var(--line);background:var(--surface)}
.ksum .n{font-family:var(--disp);font-weight:700;font-size:21px}
.ksum .l{font-size:11px;font-family:var(--mono);color:var(--ink3);text-transform:uppercase;letter-spacing:.05em}
.plantable{width:100%;border-collapse:collapse}
.plantable th{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);font-weight:500}
.plantable td{padding:9px 12px;border-bottom:1px solid var(--line2);font-size:13px;vertical-align:top}
.plantable input[type=text]{border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12.5px;width:110px;font-family:var(--body);background:#fff}
.plantable select{border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:12.2px;background:#fff;font-family:var(--body)}
.plantable .cname{font-weight:600;cursor:pointer;color:var(--ink)}
.plantable .cname:hover{color:var(--accent-ink)}
.pgrouph td{background:var(--surface2);font-family:var(--disp);font-weight:600;font-size:13.5px;padding:10px 12px}
.prio{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:4px}
.prio.H{background:#F4E3E3;color:var(--fail)}.prio.M{background:#F4ECDD;color:var(--partial)}.prio.L{background:#E8EBF1;color:var(--ink3)}
.covercard{padding:16px 18px;margin-bottom:16px}
.covgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:9px;margin-top:11px}
.covcat{border:1px solid var(--line2);border-radius:8px;padding:9px 11px;background:var(--surface2)}
.covcat .h{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;font-weight:600;margin-bottom:6px}
.covcat .bar{height:6px;border-radius:3px;background:var(--line2);overflow:hidden}
.covcat .bar i{display:block;height:100%;background:var(--cc)}

/* ---------- community ---------- */
.combar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:14px 0 18px}
.switch{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);cursor:pointer;border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:5px 12px;font-weight:500;user-select:none}
.switch input{accent-color:var(--accent);margin:0}
.seedtag{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.06em;color:#fff;background:var(--ink3);border-radius:4px;padding:1.5px 5px;text-transform:uppercase}
.youtag{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.06em;color:#fff;background:var(--accent);border-radius:4px;padding:1.5px 5px;text-transform:uppercase}
.actgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:13px;margin-top:14px}
.actcard{padding:16px;display:flex;flex-direction:column;gap:7px;cursor:pointer;transition:transform .1s}
.actcard:hover{transform:translateY(-2px);text-decoration:none}
.actcard .ic{font-size:18px}
.actcard h3{margin:0;font-family:var(--disp);font-size:15px;font-weight:600;color:var(--ink)}
.actcard p{margin:0;font-size:12.8px;color:var(--ink2);flex:1}
.actcard .cnt{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.profilecard{padding:16px 18px;display:flex;flex-wrap:wrap;gap:9px 14px;align-items:center}
.profilecard .f{display:flex;flex-direction:column;gap:3px}
.profilecard label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.profilecard input,.profilecard select{border:1px solid var(--line);border-radius:7px;padding:6px 9px;font-size:13px;font-family:var(--body);background:#fff;min-width:150px}
.scalegrid{display:flex;flex-direction:column;gap:14px;margin-top:14px}
.scaleq{border:1px solid var(--line2);border-radius:10px;padding:13px 15px;background:var(--surface2)}
.scaleq .qh{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:9px}
.scaleq .qh b{font-size:13.5px}
.scaleq .qh .dim{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3)}
.anchors{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.anchor{position:relative}
.anchor input{position:absolute;opacity:0;inset:0;cursor:pointer}
.anchor span{display:block;border:1.5px solid var(--line);border-radius:8px;padding:8px 9px;font-size:11.6px;line-height:1.35;color:var(--ink2);background:#fff;height:100%;cursor:pointer;transition:border-color .1s}
.anchor span b{display:block;font-family:var(--mono);font-size:10px;color:var(--ink3);margin-bottom:3px}
.anchor input:checked+span{border-color:var(--accent);background:var(--accent-soft);color:var(--ink)}
.anchor input:focus-visible+span{outline:2px solid var(--accent);outline-offset:2px}
.anchor .crowdmark{position:absolute;top:-7px;right:7px;background:var(--ink);color:#fff;font-family:var(--mono);font-size:9px;border-radius:4px;padding:1px 5px}
.pairwrap{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch;margin-top:16px}
.paircard{padding:18px;border-top:3px solid var(--cc);display:flex;flex-direction:column;gap:8px;cursor:pointer;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow);font-family:var(--body);transition:transform .1s}
.paircard:hover{transform:translateY(-2px);border-color:var(--accent)}
.paircard .code{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--cc)}
.paircard .v{font-weight:600;font-size:14.5px;line-height:1.35}
.paircard .d{font-size:12.5px;color:var(--ink2)}
.pairvs{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-family:var(--disp);font-weight:700;color:var(--ink3)}
.pairskip{margin-top:12px;text-align:center}
.pairresult{margin-top:14px;font-size:13px}
.rankline{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;color:var(--ink2);padding:4px 0}
.rankline .bar{flex:1;height:7px;border-radius:4px;background:var(--line2);overflow:hidden}
.rankline .bar i{display:block;height:100%;background:var(--cc)}
.heat{display:grid;grid-template-columns:34px repeat(5,1fr);gap:5px;margin-top:14px}
.heat .axl{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9.5px;color:var(--ink3);writing-mode:vertical-rl;transform:rotate(180deg)}
.heat .hcell{min-height:62px;border-radius:7px;padding:5px;display:flex;flex-wrap:wrap;gap:3px;align-content:flex-start;border:1px solid var(--line2)}
.heat .hcell a{font-family:var(--mono);font-size:9.5px;font-weight:600;background:rgba(255,255,255,.85);border-radius:4px;padding:1px 4px;color:var(--ink2)}
.heat .hax{font-family:var(--mono);font-size:9.5px;color:var(--ink3);text-align:center;padding-top:3px}
.feed{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.feeditem{display:flex;gap:10px;padding:10px 13px;border:1px solid var(--line2);border-radius:8px;background:var(--surface2);font-size:12.8px;align-items:baseline}
.feeditem .who{font-family:var(--mono);font-size:11px;color:var(--accent-ink);white-space:nowrap}
.feeditem .what{flex:1;color:var(--ink2)}
.draftrow{border:1.5px dashed var(--line);border-radius:var(--rad);background:repeating-linear-gradient(45deg,#fff,#fff 12px,#FBFCFD 12px,#FBFCFD 24px)}
.drafthead{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.crbadge{font-family:var(--mono);font-size:10px;font-weight:600;background:var(--ink);color:#fff;border-radius:5px;padding:2px 7px;letter-spacing:.05em}
.votebtns{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.simwarn{border:1px solid #E8D9A8;background:#FBF6E4;border-radius:8px;padding:10px 13px;font-size:12.8px;margin-top:10px}
.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:12px}
.formgrid .f{display:flex;flex-direction:column;gap:4px}
.formgrid label,.fullf label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.formgrid input,.formgrid select,.fullf input,.fullf textarea,.fullf select{border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:13.5px;font-family:var(--body);background:#fff;width:100%}
.fullf{display:flex;flex-direction:column;gap:4px;margin-top:12px}
.fullf textarea{min-height:74px;resize:vertical}
.combo-note{font-size:12px;color:var(--ink3);margin-top:4px}
.compane{margin-top:16px;padding:18px 20px;border-left:3px solid var(--accent)}
.statbars{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-top:10px}
.statbar .l{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.statbar .bar{height:7px;border-radius:4px;background:var(--line2);overflow:hidden;position:relative}
.statbar .bar i{display:block;height:100%;background:var(--accent)}
.statbar .bar .you{position:absolute;top:-2px;width:2.5px;height:11px;background:var(--ink);border-radius:2px}
.rpnpill{font-family:var(--mono);font-size:12px;font-weight:600;border-radius:6px;padding:3px 9px;background:var(--ink);color:#fff}
@media (max-width:740px){
  .anchors{grid-template-columns:1fr}
  .pairwrap{grid-template-columns:1fr}
  .pairvs{flex-direction:row}
  .heat .hcell{min-height:44px}
}

/* footer */
footer{border-top:1px solid var(--line);margin-top:60px;padding:22px 20px;font-size:12.5px;color:var(--ink3)}
footer .in{max-width:1240px;margin:0 auto;display:flex;flex-wrap:wrap;gap:8px 24px}

@media (max-width:920px){
  .hero,.twocol,.plannerintro{grid-template-columns:1fr}
  .pipeline{grid-template-columns:1fr}
  .pipe{border-left:none;border-top:1px solid var(--line2)}
  .pipe::after{content:"↓";right:auto;left:20px;top:auto;bottom:-10px}
  .auditbar{position:static}
  .riskrow{grid-template-columns:60px 1fr}
  .riskrow .cov{display:none}
  .plantable .hide-m{display:none}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-in">
    <a class="brand" href="#/overview" style="text-decoration:none"><svg width="20" height="17" viewBox="0 0 114 98" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none;align-self:center"><path d="M75.4588 0.394531C76.0684 0.394531 76.672 0.421038 77.2688 0.472142H113.7L94.2092 33.8618L94.1937 33.8359C90.4615 40.5222 83.4694 45.0232 75.4588 45.0232C68.7257 45.0232 62.7122 41.8432 58.749 36.8587L71.5016 58.7048C74.0367 63.0478 74.0367 68.4197 71.5016 72.7627L56.9998 97.6057L0.299805 0.472142H29.5035C34.4609 0.472142 39.0457 3.10446 41.5449 7.38581L55.5216 31.3293C54.4448 28.6771 53.8491 25.765 53.8491 22.7091C53.8491 10.3852 63.5241 0.394531 75.4588 0.394531Z" fill="#FC5F2B"/></svg>ValOS <span class="tag">Explorer</span></a>
    <nav class="tabs" id="tabs">
      <a href="#/overview" data-v="overview">Overview</a>
      <a href="#/risks" data-v="risks">Risks</a>
      <a href="#/mitigations" data-v="mitigations">Mitigations</a>
      <a href="#/controls" data-v="controls">Controls &amp; Audit</a>
      <a href="#/planner" data-v="planner">Planner</a>
      <a href="#/community" data-v="community">Community</a>
    </nav>
  </div>
</header>
<main class="wrap" id="app" aria-live="polite"></main>
<footer><div class="in">
  <span>ValOS — Validator Operations Standard · © 2026 Lido Labs Foundation · Apache 2 License</span>
  <span>This explorer is a navigation aid — the specification text is normative. <a href="https://github.com/lidofinance/valos" target="_blank" rel="noopener">Spec repository ↗</a></span>
</div></footer>

<script>
const DATA = "__DATA__";

/* ===== indexes ===== */
const CATS = DATA.categories;
const catById = Object.fromEntries(CATS.map(c=>[c.id,c]));
const catByCode = Object.fromEntries(CATS.map(c=>[c.code,c]));
const RISKS = DATA.risks;
const riskByCode = Object.fromEntries(RISKS.map(r=>[r.code,r]));
const ACTIVE = RISKS.filter(r=>r.status==='active');
const MITS = DATA.mitigations;
const mitById = Object.fromEntries(MITS.map(m=>[m.id,m]));
const MGROUPS = DATA.mitGroups;
const mgById = Object.fromEntries(MGROUPS.map(g=>[g.id,g]));
const CTLS = DATA.controls;
const ctlById = Object.fromEntries(CTLS.map(c=>[c.id,c]));
const CGROUPS = DATA.ctlGroups;
const cgById = Object.fromEntries(CGROUPS.map(g=>[g.id,g]));
const S = DATA.stats;
const OWASP_ITEMS={OWASP_TOP10:'Top 10',OWASP_ACCESS_CONTROL:'A01 Access Control',SSRF:'A10 SSRF',CRYPTOFAIL:'A02 Crypto Failures'};
const fwFamily = f => f==='SOC2'?'SOC2':(f==='ISO27001'?'ISO27001':'OWASP');
const FW_LABEL = f => f==='SOC2'?'SOC 2':(f==='ISO27001'?'ISO 27001':('OWASP '+(OWASP_ITEMS[f]||f.replace(/_/g,' '))));

/* ===== workspace state (in-memory; export/import for persistence) ===== */
const ws = { assess:{}, plan:{}, community:{ profile:null, claims:[], hideSeed:false, showDrafts:false } };
const ASSESS_OPTS = [['','Not assessed'],['pass','Conformant'],['partial','Partial'],['fail','Gap'],['na','N/A']];
const PLAN_OPTS = [['backlog','Backlog'],['scoping','Scoping'],['progress','In progress'],['blocked','Blocked'],['done','Done']];
function getAssess(id){ return ws.assess[id] || (ws.assess[id]={status:'',note:''}); }
function getPlan(id){
  if(!ws.plan[id]){
    const c = ctlById[id];
    const n = c.all ? 99 : c.risks.length;
    ws.plan[id] = {status:'backlog', owner:'', due:'', prio: n>=8?'H':(n>=3?'M':'L')};
  }
  return ws.plan[id];
}

/* ===== helpers ===== */
const esc = s => String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const cc = code => `var(--c-${code})`;
const ct = code => `var(--t-${code})`;
function riskChip(code){
  const r = riskByCode[code]; if(!r) return '';
  const k = catById[r.cat].code;
  return `<a class="chip" style="background:${ct(k)};color:${cc(k)}" href="#/risks/${code}" title="${esc(r.vector)}"><span class="dot" style="background:${cc(k)}"></span>${code}</a>`;
}
function ticks(m,c){
  const t = (n,cls)=>Array.from({length:Math.min(n,8)},()=>`<i class="${cls}"></i>`).join('') + (n>8?`<span class="kbd-hint">+${n-8}</span>`:'');
  return `<span class="ticks" title="${m} mitigations">${t(m,'m')}</span> <span class="ticks" title="${c} controls">${t(c,'c')}</span>`;
}
function prose(body){
  let h=''; let inUl=false;
  for(const b of (body||[])){
    if(b.t==='b'){ if(!inUl){h+='<ul>';inUl=true;} h+=`<li>${esc(b.x)}</li>`; continue; }
    if(inUl){h+='</ul>';inUl=false;}
    if(b.t==='h'){ if(!/risks that|helps address|relevant controls|external controls/i.test(b.x)) h+=`<h4>${esc(b.x)}</h4>`; }
    else h+=`<p>${esc(b.x)}</p>`;
  }
  if(inUl)h+='</ul>';
  return h;
}
function groupRisksByCat(codes){
  const by={};
  codes.forEach(c=>{ const r=riskByCode[c]; if(!r)return; (by[r.cat]=by[r.cat]||[]).push(c); });
  return CATS.filter(c=>by[c.id]).map(c=>({cat:c,codes:by[c.id]}));
}
function download(name, text, type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:type||'text/plain'}));
  a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
function csvRow(cells){ return cells.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')+'\n'; }

/* ===== router ===== */
const app = document.getElementById('app');
function route(){
  const h = location.hash.replace(/^#\/?/,'') || 'overview';
  const [view, arg] = h.split('/');
  document.querySelectorAll('#tabs a').forEach(a=>a.classList.toggle('on', a.dataset.v===view));
  const views = {overview:vOverview, risks:vRisks, mitigations:vMits, controls:vControls, planner:vPlanner, community:vCommunity};
  (views[view]||vOverview)(decodeURIComponent(arg||''));
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', route);

/* ===== OVERVIEW ===== */
function vOverview(){
  const fwSet = new Set(); CTLS.forEach(c=>c.externals.forEach(e=>fwSet.add(fwFamily(e.fw))));
  const avgDef = (ACTIVE.reduce((a,r)=>a+r.mits.length+r.ctls.length,0)/ACTIVE.length).toFixed(1);
  app.innerHTML = `
  <section class="hero">
    <div>
      <span class="eyebrow">Validator Operations Standard · v1 editor's draft</span>
      <h1 class="disp">Every way a node operation goes wrong — and what the best operators do about it.</h1>
      <p class="lede">ValOS maps the full risk surface of running blockchain validators — slashing, downtime, key custody, hacking — to the mitigation strategies practitioners actually use, and to <strong>${S.reqs} testable controls</strong> you can assess, evidence, and certify against.</p>
      <div class="statline">
        <span class="st"><span class="n">${S.activeRisks}</span><span class="l">risks</span></span>
        <span class="st"><span class="n">${S.mitigations}</span><span class="l">mitigations</span></span>
        <span class="st"><span class="n">${S.reqs}</span><span class="l">requirements</span></span>
        <span class="st"><span class="n">${avgDef}</span><span class="l">avg defenses / risk</span></span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
        <a class="btn primary" href="#/risks">Explore the risks</a>
        <a class="btn" href="#/controls">Open the audit checklist</a>
      </div>
    </div>
    <div class="card fabric-card">
      <div class="fabric-head">
        <div><strong style="font-family:var(--disp)">The risk surface</strong><div class="small muted">All ${S.activeRisks} active risks. Hover to inspect, click to dive in.</div></div>
      </div>
      <div class="fabric" id="fabric">${ACTIVE.map(r=>{
        const k = catById[r.cat].code;
        return `<a class="fcell" data-cat="${r.cat}" style="--cc:${cc(k)}" href="#/risks/${r.code}" data-code="${r.code}">${r.code}</a>`;
      }).join('')}</div>
      <div class="flegend" id="flegend">${CATS.map(c=>`<button data-cat="${c.id}"><span class="dot" style="background:${cc(c.code)}"></span>${c.code}</button>`).join('')}</div>
      <div class="fabric-tip" id="fabrictip">Each cell is a documented risk vector. Colors are the eight risk categories.</div>
    </div>
  </section>

  <section class="pipeline">
    <a class="pipe" href="#/risks" style="text-decoration:none;color:inherit">
      <span class="n" style="color:var(--c-SLS)">${S.activeRisks}</span>
      <h3>Risks, named precisely</h3>
      <p>Eight categories, from double-signing to delinquent withdrawals. Each risk has a stable ID, a vector, and a plain-language description of how it bites.</p>
      <span class="go">Browse risks →</span>
    </a>
    <a class="pipe" href="#/mitigations" style="text-decoration:none;color:inherit">
      <span class="n" style="color:var(--accent)">${S.mitigations}</span>
      <h3>Mitigations that work</h3>
      <p>Strategies contributed by operators in the field — anti-slashing databases, client diversity, least privilege — each linked to the exact risks it reduces, with tooling pointers.</p>
      <span class="go">Study mitigations →</span>
    </a>
    <a class="pipe" href="#/controls" style="text-decoration:none;color:inherit">
      <span class="n" style="color:var(--c-SPS)">${S.reqs}</span>
      <h3>Controls you can prove</h3>
      <p>Testable MUST/SHOULD requirements, cross-referenced to SOC&nbsp;2, ISO&nbsp;27001 and OWASP — so prior certifications count, and new ones come faster.</p>
      <span class="go">Run a self-assessment →</span>
    </a>
  </section>

  <section class="ovh">
    <span class="eyebrow">Why operators go through this</span>
    <h2 class="sec" style="margin-top:8px">The payoff of doing the risk work</h2>
    <div class="value">
      <div class="card v"><h3>Protect rewards, avoid penalties</h3><p>${riskByCode['SLS1']?'Slashing and downtime risks are the most densely mitigated areas of the standard':''} — the practices here exist because they demonstrably reduce double-signing incidents and missed attestations that cost real yield.</p></div>
      <div class="card v"><h3>Win delegations and mandates</h3><p>Protocols and institutional stakers increasingly ask how you manage risk. A documented assessment against a recognized standard answers before they ask.</p></div>
      <div class="card v"><h3>Reuse your SOC 2 / ISO 27001 work</h3><p>Controls are explicitly mapped to ${[...fwSet].length} external frameworks. Already certified? Much of the evidence carries over. Not yet? ValOS conformance gives you a head start.</p></div>
      <div class="card v"><h3>Know what to fix first</h3><p>Every risk shows its defenses; every control shows the risks it closes. Gaps become visible — and the built-in planner turns them into an assignable work queue.</p></div>
    </div>
  </section>

  <section class="ovh">
    <span class="eyebrow">Pick your path</span>
    <h2 class="sec" style="margin-top:8px">Five ways into the standard</h2>
    <div class="personas">
      <a class="card persona" href="#/risks"><span class="ic">🧭</span><h3>Just browsing</h3><p>Skim the eight risk categories and see at a glance how exposed a typical operation is — and how covered it could be.</p><span class="go">Start with risks →</span></a>
      <a class="card persona" href="#/mitigations"><span class="ic">🔬</span><h3>Deep dive</h3><p>Read how practitioners mitigate specific risks: the reasoning, the best practices, and the tools the field actually uses.</p><span class="go">Open mitigations →</span></a>
      <a class="card persona" href="#/controls"><span class="ic">🗂️</span><h3>Auditor / assessor</h3><p>Work the controls catalog as a checklist: record conformance per requirement, capture evidence notes, filter by framework, export the result.</p><span class="go">Open audit view →</span></a>
      <a class="card persona" href="#/community"><span class="ic">🧠</span><h3>Add your knowledge</h3><p>Rate likelihood and impact, report incidents, propose missing risks — structured claims from the whole staking community.</p><span class="go">Contribute →</span></a>
      <a class="card persona" href="#/planner"><span class="ic">📋</span><h3>Rolling it out</h3><p>Turn the ${S.controls} controls into an implementation plan: owners, priorities, status — and watch risk coverage climb as work lands.</p><span class="go">Open planner →</span></a>
    </div>
  </section>

  <section class="ovh">
    <span class="eyebrow">Framework crosswalk</span>
    <h2 class="sec" style="margin-top:8px">Plays well with what you already have</h2>
    <p class="lede small" style="margin-top:4px">Where a ValOS control corresponds to a control in a common framework, the mapping is shown inline — in both directions: it simplifies certifying against ValOS if you hold these, and assessing ValOS-conformant operators against them.</p>
    <div class="crosswalk">${[...fwSet].map(f=>`<span class="fwchip ${esc(f)}" style="font-size:12.5px;padding:5px 11px">${f==='OWASP'?'OWASP Top 10':esc(FW_LABEL(f))}</span>`).join('')}</div>
  </section>`;

  /* fabric interactions */
  const tip = document.getElementById('fabrictip');
  document.getElementById('fabric').addEventListener('mouseover', e=>{
    const c = e.target.closest('.fcell'); if(!c) return;
    const r = riskByCode[c.dataset.code];
    tip.innerHTML = `<strong class="mono" style="color:${cc(catById[r.cat].code)}">${r.code}</strong> · ${esc(r.vector)} — covered by <strong>${r.mits.length}</strong> mitigations and <strong>${r.ctls.length}</strong> controls.`;
  });
  let activeCat = null;
  document.getElementById('flegend').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    activeCat = activeCat===b.dataset.cat ? null : b.dataset.cat;
    document.querySelectorAll('#flegend button').forEach(x=>x.classList.toggle('on', x.dataset.cat===activeCat));
    document.querySelectorAll('.fcell').forEach(x=>x.classList.toggle('dim', activeCat && x.dataset.cat!==activeCat));
    tip.innerHTML = activeCat ? `<strong>${esc(catById[activeCat].name)}.</strong> ${esc(catById[activeCat].intro||'')}` : 'Each cell is a documented risk vector. Colors are the eight risk categories.';
  });
}

/* ===== RISKS ===== */
let riskFilter = {q:'', cat:'', grp:''};
function vRisks(arg){
  if(arg && riskByCode[arg]) return vRiskDetail(riskByCode[arg]);
  if(arg && catById[arg]) riskFilter.cat = arg;
  const grps = [...new Set(ACTIVE.map(r=>r.group))].filter(Boolean).sort();
  const f = riskFilter;
  const list = ACTIVE.filter(r=>
    (!f.cat || r.cat===f.cat) &&
    (!f.grp || r.group===f.grp) &&
    (!f.q || (r.code+' '+r.vector+' '+r.desc).toLowerCase().includes(f.q.toLowerCase()))
  );
  app.innerHTML = `
  <span class="eyebrow">Risk register</span>
  <h1 class="disp" style="font-size:clamp(24px,3vw,32px)">Know what can hurt you</h1>
  <p class="lede small">${S.activeRisks} active risks in eight categories. Identifiers are stable across versions of the standard — safe to reference in your own runbooks and risk register.</p>
  <div class="catgrid">${CATS.map(c=>{
    const n = ACTIVE.filter(r=>r.cat===c.id);
    const mits = new Set(), ctls = new Set();
    n.forEach(r=>{r.mits.forEach(m=>mits.add(m)); r.ctls.forEach(x=>ctls.add(x));});

/* ===== CONTROLS / AUDIT ===== */
let ctlFilter = {fw:'', q:''};
function assessSummary(){
  let pass=0, partial=0, fail=0, na=0, total=0;
  CTLS.forEach(c=>c.reqs.forEach(rq=>{
    total++;
    const s=(ws.assess[rq.id]||{}).status;
    if(s==='pass')pass++; else if(s==='partial')partial++; else if(s==='fail')fail++; else if(s==='na')na++;
  }));
  return {pass,partial,fail,na,total,done:pass+partial+fail+na};
}
function vControls(arg){

    c.group===g.id &&
    (!f.fw || c.externals.some(e=>fwFamily(e.fw)===f.fw) || (cgById[c.group].externals||[]).some(e=>fwFamily(e.fw)===f.fw)) &&
    (!f.q || (c.name+' '+c.reqs.map(r=>r.text).join(' ')).toLowerCase().includes(f.q.toLowerCase()))
  )})).filter(x=>x.ctls.length);
  app.innerHTML = `

  <p class="lede small">Conformance to ValOS means meeting these requirements. Record a status and evidence note per requirement; export the result for your audit file. <strong>Your entries live in this browser session only — export to keep them, import to resume.</strong></p>

      <div class="pbar">

        <i class="q" style="width:${100*sum.partial/sum.total}%"></i>

      ${(g.externals||[]).map(e=>`<span class="fwchip ${fwFamily(e.fw)}">${esc(FW_LABEL(e.fw))} ${esc(e.ref)}</span>`).join('')}

function bindControls(){
  app.querySelectorAll('[data-req]').forEach(sel=>sel.addEventListener('change', ()=>{
    const a = getAssess(sel.dataset.req);
    a.status = sel.value; markDirty();
    sel.className = 'statussel s-'+(sel.value||'none');
    const ta = app.querySelector(`[data-note="${sel.dataset.req}"]`);
    if(ta && sel.value) ta.style.display='block';
    refreshAuditBar();
  }));
  app.querySelectorAll('[data-note]').forEach(ta=>ta.addEventListener('input', ()=>{ getAssess(ta.dataset.note).note = ta.value; markDirty(); }));
  app.querySelectorAll('[data-go]').forEach(h=>h.addEventListener('click', ()=>{ location.hash = h.dataset.go; }));
  document.getElementById('cfw').addEventListener('change', e=>{ ctlFilter.fw=e.target.value; vControls(); });
  const cq=document.getElementById('cq');
  cq.addEventListener('input', ()=>{ ctlFilter.q=cq.value; vControls(); const el=document.getElementById('cq'); el.focus(); el.setSelectionRange(el.value.length, el.value.length); });
  document.getElementById('expcsv').addEventListener('click', exportAssessCsv);

  document.getElementById('impjson').addEventListener('click', ()=>document.getElementById('impfile').click());

}
function refreshAuditBar(){
  const sum = assessSummary();
  const bar = app.querySelector('.pbar'); if(!bar) return;
  bar.innerHTML = `<i class="p" style="width:${100*sum.pass/sum.total}%"></i><i class="q" style="width:${100*sum.partial/sum.total}%"></i><i class="f" style="width:${100*sum.fail/sum.total}%"></i><i class="x" style="width:${100*sum.na/sum.total}%"></i>`;
  app.querySelector('.progress .lbl span:last-child').textContent = `${sum.done}/${sum.total} assessed · ${sum.pass} conformant`;
}
function exportAssessCsv(){
  let csv = csvRow(['Requirement ID','Level','Requirement','Control','Group','Frameworks','Risks addressed','Status','Evidence']);
  CTLS.forEach(c=>c.reqs.forEach(rq=>{
    const a = ws.assess[rq.id]||{};
    csv += csvRow([rq.id, rq.level, rq.text, c.name, cgById[c.group].name,
      c.externals.map(e=>FW_LABEL(e.fw)+' '+e.ref).join('; '),
      c.all?'All risks':c.risks.join(' '),
      (ASSESS_OPTS.find(o=>o[0]===(a.status||''))||[])[1]||'Not assessed', a.note||'']);
  }));
  download('valos-self-assessment.csv', csv, 'text/csv');
}

}

function buildSeed(){
  const claims = [];

  // estimates
  ACTIVE.forEach(r=>{
    const cat = catById[r.cat].code;
    SEED_PEOPLE.forEach(p=>{
      const rg = _rng(r.code+p.h);
      if(rg() > 0.58) return; // partial coverage
      DIMS.forEach(d=>{
        if(rg() > 0.85) return; // occasionally skip a dimension
        let v = SEED_BIAS[cat][d.k] + (d.k==='freq' ? (p.fAdj[cat]||0) : (p.dAdj[d.k]||0)) + (rg()*2-1)*1.05;
        v = Math.max(0, Math.min(4, Math.round(v)));
        claims.push({seed:true, type:'estimate', by:p.h, role:p.role, risk:r.code, dim:d.k, value:v, ts:tick()});
      });

  const rgp = _rng('pairs');

    const bias = SEED_BIAS[catById[riskByCode[code].cat].code];
    const f = bias.freq + (rgp()*2-1)*.8;
    const imp = Math.max(bias.fin, bias.rep, bias.reg, bias.net) + (rgp()*2-1)*.6;
    return f * imp;
  };
  for(let i=0;i<170;i++){
    const a = ACTIVE[Math.floor(rgp()*ACTIVE.length)];
    let b = ACTIVE[Math.floor(rgp()*ACTIVE.length)];
    if(a===b) continue;
    const p = SEED_PEOPLE[Math.floor(rgp()*SEED_PEOPLE.length)];
    claims.push({seed:true, type:'pairwise', by:p.h, a:a.code, b:b.code, winner: pairScore(a.code)>=pairScore(b.code)?'a':'b', ts:tick()});
  }
  // incidents
  [
    {risk:'SLS15', by:'@failover_phil', year:'2025', setup:'Professional, ~800 validators, two sites, remote signer', outcome:'Near-miss',
     text:'During a DR drill the primary site recovered from a network partition while the failover was already signing. Doppelgänger detection on restart caught it before a double sign. We now require a manual fencing step before any failback.'},
    {risk:'DOW4', by:'@basement_staker', year:'2024', setup:'Solo home staker, 3 validators, home bare metal', outcome:'Loss — minor',
     text:'Family member unplugged the “noisy box” during a holiday. 9 hours of missed attestations (~0.004 ETH). UPS now has a label and the dashboard pings my phone.'},

    {risk:'GIR16', by:'@rotki_rosa', year:'2025', setup:'Hobbyist, 12 validators', outcome:'Loss — minor',

  ].forEach(x=>claims.push({seed:true, type:'incident', ...x, ts:tick()}));
  // mitigation ideas & tool reports
  claims.push({seed:true, type:'mitidea', by:'@failover_phil', risk:'SLS15', kind:'practice', ts:tick(),
    text:'Treat failback like failover: require a fencing token (STONITH-style) so the primary cannot resume signing until the failover is provably stopped and the anti-slashing DB is re-imported.'});
  claims.push({seed:true, type:'mitidea', by:'@dvt_dana', risk:'KEC6', kind:'practice', ts:tick(),
    text:'DVT/threshold setups remove the single keystore as a point of loss — losing one share is an inconvenience, not an incident.'});
  claims.push({seed:true, type:'mitidea', by:'@clientdev_kira', risk:'DOW19', kind:'counterexample', ts:tick(),
    text:'“Always update fast” backfires around hard forks: updating all nodes to the same fresh release at once trades downtime risk for monoculture bug risk. Stagger by client and by cohort.'});
  claims.push({seed:true, type:'tool', by:'@auditoor', risk:'SLS4', name:'Web3Signer', url:'https://docs.web3signer.consensys.net', verdict:'footgun', ts:tick(),
    note:'Older compose examples ship with the slashing-protection DB effectively in-memory. Verify it is on persistent disk and exported in your runbooks.'});
  claims.push({seed:true, type:'tool', by:'@nodewhale', risk:'SLS15', name:'Vouch + Dirk', url:'https://github.com/attestantio/vouch', verdict:'works', ts:tick(),
    note:'Multi-beacon-node setup with Dirk signing rules gave us failover without a second validator client holding keys.'});
  claims.push({seed:true, type:'tool', by:'@basement_staker', risk:'KEC1', name:'ethdo', url:'https://github.com/wealdtech/ethdo', verdict:'works', ts:tick(),
    note:'Scriptable key inspection and offline operations — keeps keystore handling out of ad-hoc shell history.'});
  // community draft risks
  const drafts = [
    {id:'CR-1', by:'@nodewhale', cat:'sec-risks-downtime', group:'Infrastructure',
     vector:'MEV relay dependency: relay outage or censorship degrades block value',
     desc:'Operators relying on a small set of MEV relays inherit their availability and policy: a relay outage, deprecation, or censorship decision reduces proposal value or causes missed/late blocks, concentrating risk outside the operator\u2019s control.'},
    {id:'CR-2', by:'@basement_staker', cat:'sec-risks-infra', group:'Process',

function allClaims(){

function med(arr){ if(!arr.length) return null; const s=[...arr].sort((a,b)=>a-b); const m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; }
function aggRisk(code){
  const est = allClaims().filter(c=>c.type==='estimate'&&c.risk===code);
  const out = {n:new Set(est.map(c=>c.by)).size, dims:{}};
  DIMS.forEach(d=>{
    const vals = est.filter(c=>c.dim===d.k).map(c=>c.value);
    out.dims[d.k] = {med:med(vals), n:vals.length};
  });
  const sevs = ['fin','rep','reg','net'].map(k=>out.dims[k].med).filter(v=>v!=null);
  out.sev = sevs.length?Math.max(...sevs):null;
  out.rpn = (out.dims.freq.med!=null&&out.sev!=null&&out.dims.det.med!=null)
    ? Math.round((out.dims.freq.med+1)*(out.sev+1)*(out.dims.det.med+1)) : null;
  return out;
}
function myEstimate(code,dim){
  const m = myClaims().filter(c=>c.type==='estimate'&&c.risk===code&&c.dim===dim);
  return m.length? m[m.length-1].value : null;
}
function eloRanking(){
  const R = {}; ACTIVE.forEach(r=>R[r.code]=1500);
  allClaims().filter(c=>c.type==='pairwise').sort((a,b)=>a.ts-b.ts).forEach(v=>{
    if(!(v.a in R)||!(v.b in R)||(v.winner!=='a'&&v.winner!=='b')) return;
    const Ea = 1/(1+Math.pow(10,(R[v.b]-R[v.a])/400));
    const Sa = v.winner==='a'?1:0;
    R[v.a]+=32*(Sa-Ea); R[v.b]+=32*((1-Sa)-(1-Ea));
  });
  return Object.entries(R).sort((x,y)=>y[1]-x[1]);
}
function communityRisks(){
  return allClaims().filter(c=>c.type==='newrisk');
}
function crVotes(id){
  const v = allClaims().filter(c=>c.type==='crvote'&&c.target===id);
  return {confirms:v.filter(x=>x.v==='confirm'), dups:v.filter(x=>x.v==='dup')};
}
function nextCrId(){
  let n = 0;
  communityRisks().concat(myClaims().filter(c=>c.type==='newrisk')).forEach(c=>{
    const m = /^CR-(\d+)$/.exec(c.id); if(m) n=Math.max(n, +m[1]);
  });
  return 'CR-'+(n+1);
}
/* similarity: cosine-ish token overlap against existing risks */
const STOP = new Set('a an the of to in on for and or is are be can that this with by as from not lead leads leading due risk risks failure operational'.split(' '));
function toks(s){ return new Set(String(s).toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(w=>w.length>2&&!STOP.has(w))); }
function similar(text){
  const q = toks(text); if(q.size<2) return [];
  return ACTIVE.map(r=>{
    const t = toks(r.vector+' '+r.desc);
    let inter=0; q.forEach(w=>{if(t.has(w))inter++;});
    return {r, s: inter/Math.sqrt(q.size*t.size)};
  }).filter(x=>x.s>0.13).sort((a,b)=>b.s-a.s).slice(0,3);
}

function feedItemHTML(c){
  const tag = c.seed?'<span class="seedtag">demo</span>':'<span class="youtag">you</span>';

  let what='';
  if(c.type==='estimate') what=`rated ${rl(c.risk)} ${DIM_BY_K[c.dim].name.toLowerCase()} = <b>${c.value}</b> (${esc(DIM_BY_K[c.dim].anchors[c.value])})`;
  else if(c.type==='pairwise') what=`judged ${rl(c.winner==='a'?c.a:c.b)} higher overall risk than ${rl(c.winner==='a'?c.b:c.a)}`;
  else if(c.type==='incident') what=`reported a ${c.outcome.toLowerCase()} on ${rl(c.risk)}: “${esc(c.text.slice(0,90))}…”`;
  else if(c.type==='mitidea') what=`${c.kind==='counterexample'?'flagged a counterexample':'suggested a practice'} on ${rl(c.risk)}: “${esc(c.text.slice(0,90))}…”`;
  else if(c.type==='tool') what=`reported tool <b>${esc(c.name)}</b> (${c.verdict}) on ${rl(c.risk)}`;
  else if(c.type==='newrisk') what=`proposed new risk <a href="#/community/${c.id}" class="mono">${c.id}</a>: “${esc(c.vector)}”`;
  else if(c.type==='crvote') what=`${c.v==='confirm'?'confirmed':'flagged as duplicate'} draft <a href="#/community/${c.target}" class="mono">${c.target}</a>`;
  return `<div class="feeditem"><span class="who">${esc(c.by)}</span><span class="what">${what}</span>${tag}</div>`;
}
function heatmapHTML(){
  const cells = Array.from({length:5},()=>Array.from({length:5},()=>[]));
  ACTIVE.forEach(r=>{
    const a = aggRisk(r.code);
    if(a.dims.freq.med==null||a.sev==null) return;
    cells[Math.round(a.sev)][Math.round(a.dims.freq.med)].push(r.code);
  });
  const colr = (x,y)=>{ const v=(x+1)*(y+1)/25; const h=120-120*v; return `hsl(${h} 62% ${92-26*v}%)`; };
  let h = '<div class="heat">';
  for(let sev=4; sev>=0; sev--){
    h += `<div class="axl">${sev===4?'severity →':''}</div>`;
    for(let f=0; f<5; f++){
      h += `<div class="hcell" style="background:${colr(f,sev)}" title="likelihood ${f}, severity ${sev}">${cells[sev][f].map(c=>`<a href="#/risks/${c}">${c}</a>`).join('')}</div>`;
    }
  }
  h += '<div></div>' + Array.from({length:5},(_,i)=>`<div class="hax">${i}${i===4?' · likelihood →':''}</div>`).join('');
  return h + '</div>';
}

/* ----- RATE A RISK ----- */
function pickRiskToRate(){
  const counts = {};
  myClaims().filter(c=>c.type==='estimate').forEach(c=>counts[c.risk]=(counts[c.risk]||0)+1);
  const sorted = ACTIVE.slice().sort((a,b)=>(counts[a.code]||0)-(counts[b.code]||0) || (aggRisk(a.code).n - aggRisk(b.code).n));
  return sorted[0].code;
}
function vRate(code){

        }).join('')}</div>

/* ----- PAIRWISE ----- */
let pairState = null, pairCount = 0;
function newPair(){
  let a = ACTIVE[Math.floor(Math.random()*ACTIVE.length)], b;
  do{ b = ACTIVE[Math.floor(Math.random()*ACTIVE.length)]; }while(b===a);
  pairState = {a,b};
}
function vPair(){
  if(!pairState) newPair();
  const {a,b} = pairState;
  const card = (r,side)=>{ const k=catById[r.cat].code; return `
    <button class="paircard" data-side="${side}" style="--cc:${cc(k)}">
      <span class="code">${r.code} · ${esc(catById[r.cat].name)}</span>
      <span class="v">${esc(r.vector)}</span>
      <span class="d">${esc(r.desc.slice(0,160))}${r.desc.length>160?'…':''}</span>
    </button>`; };
  app.innerHTML = `
  <a class="backlink" href="#/community">← Community</a>
  <span class="eyebrow">quick judgments · ${pairCount} this session</span>
  <h1 class="disp" style="font-size:clamp(22px,3vw,30px)">Which poses the greater overall risk — weighing both probability and impact?</h1>
  <p class="small muted">Judge total exposure: one risk may be rare but catastrophic; another may be frequent but cheap and recoverable. Weigh both. Pairwise comparisons beat absolute scores — they're fast, hard to game, and thousands of them build a robust risk ranking. No profile needed, just your judgment.</p>
  <div class="pairwrap">${card(a,'a')}<div class="pairvs">VS</div>${card(b,'b')}</div>
  <div class="pairskip"><button class="btn small" id="pairskip">Can't say / not comparable — next pair</button></div>
  <div class="pairresult" id="pairresult"></div>`;
  app.querySelectorAll('.paircard').forEach(btn=>btn.addEventListener('click', ()=>{
    addClaim({type:'pairwise', a:a.code, b:b.code, winner:btn.dataset.side});
    pairCount++;
    const rank = eloRanking(); const pos = Object.fromEntries(rank.map(([c],i)=>[c,i+1]));
    const w = btn.dataset.side==='a'?a:b;
    document.getElementById('pairresult').innerHTML =
      `<div class="card" style="padding:12px 16px;display:flex;gap:14px;flex-wrap:wrap;align-items:baseline">
        <span>✓ Counted. Crowd ranking now: <b class="mono">${a.code}</b> #${pos[a.code]} · <b class="mono">${b.code}</b> #${pos[b.code]} of ${ACTIVE.length}</span>
        <span class="small muted">you picked ${w.code}</span></div>`;
    newPair(); setTimeout(vPair, 650);
  }));
  document.getElementById('pairskip').addEventListener('click', ()=>{ newPair(); vPair(); });
}

  });

}
function vQueue(){
  const drafts = communityRisks().slice().sort((a,b)=>crVotes(b.id).confirms.length - crVotes(a.id).confirms.length);
  app.innerHTML = `
  <a class="backlink" href="#/community">← Community</a>
  <span class="eyebrow">review queue</span>
  <h1 class="disp" style="font-size:clamp(22px,3vw,30px)">Proposed risks, awaiting the crowd</h1>
  <p class="lede small">Confirmations and duplicate flags are claims too. Three confirmations promote a draft to <b>candidate</b> — in the real pipeline that's when editors triage it toward a spec PR.</p>
  <div class="combar">${seedToggleHTML()}<label class="switch"><input type="checkbox" id="drafttoggle" ${ws.community.showDrafts?'checked':''}> Overlay drafts in the main risk register</label></div>
  <div class="grid">${drafts.map(draftCardHTML).join('')||'<p class="muted">Queue is empty — propose the first one.</p>'}</div>`;
  bindSeedToggle(vQueue);
  document.getElementById('drafttoggle').addEventListener('change', e=>{ ws.community.showDrafts = e.target.checked; markDirty(); });
  bindDraftVotes(vQueue);
}
function vDraftDetail(id){
  const d = communityRisks().find(x=>x.id===id) || myClaims().find(x=>x.type==='newrisk'&&x.id===id);
  if(!d){ app.innerHTML = `<a class="backlink" href="#/community/queue">← Review queue</a><p class="muted">Draft ${esc(id)} isn't visible — it may be demo data currently hidden by the toggle.</p>`; return; }
  const incs = allClaims().filter(c=>c.type==='incident'&&c.risk===id);
  app.innerHTML = `
  <a class="backlink" href="#/community/queue">← Review queue</a>
  ${draftCardHTML(d)}
  ${incs.length?`<div class="card panel" style="margin-top:14px"><h2>Attached incident reports</h2>${incs.map(i=>`<div class="feeditem" style="margin-top:8px"><span class="who">${esc(i.by)}</span><span class="what">${esc(i.text)}</span>${i.seed?'<span class="seedtag">demo</span>':'<span class="youtag">you</span>'}</div>`).join('')}</div>`:''}
  <div class="notebox" style="margin-top:14px">In the production pipeline: candidate drafts become GitHub issues on the spec repo; an accepted one is assigned the next stable ID in its category and ships in the following release with the proposer in the acknowledgments.</div>`;
  bindDraftVotes(()=>vDraftDetail(id));
}

/* ----- risk-page community panel ----- */
function communityPanelHTML(r){
  const agg = aggRisk(r.code);
  const incs = allClaims().filter(c=>c.type==='incident'&&c.risk===r.code);
  const ideas = allClaims().filter(c=>(c.type==='mitidea'||c.type==='tool')&&c.risk===r.code);
  return `<div class="card compane">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">
      <h2 style="margin:0;font-family:var(--disp);font-size:16px">Community signal</h2>
      <span class="small muted">${agg.n} contributor${agg.n===1?'':'s'} ${agg.rpn?`· RPN <span class="rpnpill">${agg.rpn}</span>/125`:''}</span>
    </div>
    ${agg.n?`<div class="statbars">${DIMS.map(d=>{
      const m=agg.dims[d.k].med, y=myEstimate(r.code,d.k);
      return `<div class="statbar"><div class="l"><span>${d.s}</span><span>${m!=null?m:'–'}</span></div><div class="bar">${m!=null?`<i style="width:${(m/4)*100}%"></i>`:''}${y!=null?`<span class="you" style="left:${(y/4)*100}%" title="you: ${y}"></span>`:''}</div></div>`;
    }).join('')}</div>`:'<p class="small muted" style="margin:8px 0 0">No estimates yet — be the first.</p>'}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:13px">
      <a class="btn small primary" href="#/community/rate:${r.code}">Rate this risk</a>
      <a class="btn small" href="#/community/incident:${r.code}">Report an incident</a>
      <a class="btn small" href="#/community/idea:${r.code}">Suggest practice / tool</a>
    </div>
    ${incs.length?`<h2 style="margin:18px 0 4px;font-family:var(--disp);font-size:14.5px">Incidents & near-misses (${incs.length})</h2>${incs.map(i=>`<div class="feeditem" style="margin-top:7px"><span class="who">${esc(i.by)}</span><span class="what"><b>${esc(i.outcome)}</b>${i.setup?` · ${esc(i.setup)}`:''} · ${esc(i.year)}<br>${esc(i.text)}</span>${i.seed?'<span class="seedtag">demo</span>':'<span class="youtag">you</span>'}</div>`).join('')}`:''}
    ${ideas.length?`<h2 style="margin:18px 0 4px;font-family:var(--disp);font-size:14.5px">Suggested practices & tools (${ideas.length})</h2>${ideas.map(i=>`<div class="feeditem" style="margin-top:7px"><span class="who">${esc(i.by)}</span><span class="what">${i.type==='tool'?`<b>${esc(i.name)}</b> <span class="pill" style="${i.verdict==='footgun'?'border-color:var(--partial);color:var(--partial)':'border-color:var(--pass);color:var(--pass)'}">${i.verdict}</span> — ${esc(i.note)}`:(i.kind==='counterexample'?'<span class="pill" style="border-color:var(--partial);color:var(--partial)">counterexample</span> ':'')+esc(i.text)}</span>${i.seed?'<span class="seedtag">demo</span>':'<span class="youtag">you</span>'}</div>`).join('')}`:''}
  </div>`;
}

loadWS();

/* drafts overlay for the main risk register */
function draftOverlayHTML(){
  const drafts = communityRisks();
  if(!drafts.length) return '';
  return `<div style="margin-top:20px"><span class="eyebrow">community drafts — proposed, not yet part of the standard</span>
  <div class="risklist" style="margin-top:10px">${drafts.map(d=>{
    const k = catById[d.cat].code, v = crVotes(d.id);
    return `<a class="riskrow draftrow" style="--cc:${cc(k)}" href="#/community/${d.id}">
      <span class="code">${d.id}</span>
      <span><span class="vec">${esc(d.vector)}</span><span class="d">${esc(d.desc)}</span></span>
      <span class="cov"><span class="crbadge">DRAFT</span><span>${v.confirms.length}/3 confirms</span></span></a>`;
  }).join('')}</div></div>`;
}

route();
</script>
</body>
</html>
